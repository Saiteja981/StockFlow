<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Stock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .card{
            margin-top:40px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            Inventory Management System
        </a>

    </div>

</nav>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="text-center">
                        Update Product Stock
                    </h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/updateStock}" th:object="${product}" method="post">

                        <input type="hidden" th:field="*{productId}">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{productName}"
                                    readonly>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{category}"
                                    readonly>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Brand
                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{brand}"
                                    readonly>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Current Stock
                            </label>

                            <input
                                    type="number"
                                    class="form-control"
                                    th:field="*{stockQuantity}"
                                    required>

                        </div>

                        <div class="text-center">

                            <button
                                    type="submit"
                                    class="btn btn-success">

                                Update Stock

                            </button>

                            <a href="/products"
                               class="btn btn-secondary">

                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
