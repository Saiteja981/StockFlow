<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Purchase Record</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .card{
            margin-top:20px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">Inventory Management System</a>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3 class="text-center">Purchase Record</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/savePurchase}" th:object="${purchase}" method="post">

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Select Product</label>

                        <select class="form-select" th:field="*{productId}" required>

                            <option value="">-- Select Product --</option>

                            <option th:each="p : ${products}"
                                    th:value="${p.productId}"
                                    th:text="${p.productName}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Quantity</label>

                        <input type="number"
                               class="form-control"
                               th:field="*{quantity}"
                               required>

                    </div>

                </div>

                <br>

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Purchase Price</label>

                        <input type="number"
                               step="0.01"
                               class="form-control"
                               th:field="*{purchasePrice}"
                               required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Purchase Date</label>

                        <input type="date"
                               class="form-control"
                               th:field="*{purchaseDate}"
                               required>

                    </div>

                </div>

                <br>

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-success">

                        Save Purchase

                    </button>

                    <a href="/products"
                       class="btn btn-primary">

                        Products

                    </a>

                    <a href="/"
                       class="btn btn-secondary">

                        Home

                    </a>

                </div>

            </form>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h4>Purchase History</h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-warning">

                <tr>

                    <th>Purchase ID</th>

                    <th>Product Name</th>

                    <th>Quantity</th>

                    <th>Purchase Price</th>

                    <th>Total Cost</th>

                    <th>Purchase Date</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="purchase : ${purchaseList}">

                    <td th:text="${purchase.purchaseId}"></td>

                    <td th:text="${purchase.productName}"></td>

                    <td th:text="${purchase.quantity}"></td>

                    <td th:text="${purchase.purchasePrice}"></td>

                    <td th:text="${purchase.totalCost}"></td>

                    <td th:text="${purchase.purchaseDate}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
