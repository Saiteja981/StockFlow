<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sales Record</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .card{
            margin-top:20px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">Inventory Management System</a>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-danger text-white">

            <h3 class="text-center">Sales Record</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/saveSales}" th:object="${sales}" method="post">

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Select Product</label>

                        <select class="form-select" th:field="*{productId}" required>

                            <option value="">-- Select Product --</option>

                            <option th:each="p : ${products}"
                                    th:value="${p.productId}"
                                    th:text="${p.productName}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Customer Name</label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{customerName}"
                                required>

                    </div>

                </div>

                <br>

                <div class="row">

                    <div class="col-md-4">

                        <label class="form-label">Quantity Sold</label>

                        <input
                                type="number"
                                class="form-control"
                                th:field="*{quantitySold}"
                                required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">Selling Price</label>

                        <input
                                type="number"
                                step="0.01"
                                class="form-control"
                                th:field="*{sellingPrice}"
                                required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">Sales Date</label>

                        <input
                                type="date"
                                class="form-control"
                                th:field="*{salesDate}"
                                required>

                    </div>

                </div>

                <br>

                <div class="text-center">

                    <button
                            type="submit"
                            class="btn btn-success">

                        Save Sales

                    </button>

                    <a href="/products"
                       class="btn btn-primary">

                        Products

                    </a>

                    <a href="/"
                       class="btn btn-secondary">

                        Home

                    </a>

                </div>

            </form>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h4>Sales History</h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-danger">

                <tr>

                    <th>Sales ID</th>

                    <th>Product Name</th>

                    <th>Customer</th>

                    <th>Quantity Sold</th>

                    <th>Selling Price</th>

                    <th>Total Amount</th>

                    <th>Sales Date</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="sale : ${salesList}">

                    <td th:text="${sale.salesId}"></td>

                    <td th:text="${sale.productName}"></td>

                    <td th:text="${sale.customerName}"></td>

                    <td th:text="${sale.quantitySold}"></td>

                    <td th:text="${sale.sellingPrice}"></td>

                    <td th:text="${sale.totalAmount}"></td>

                    <td th:text="${sale.salesDate}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
