<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .table{
            background:white;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            Inventory Management System
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">

        <h2>Product List</h2>

        <a href="/addProduct" class="btn btn-success">
            Add Product
        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Product Name</th>

            <th>Category</th>

            <th>Brand</th>

            <th>Purchase Price</th>

            <th>Selling Price</th>

            <th>Stock</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="product : ${products}">

            <td th:text="${product.productId}"></td>

            <td th:text="${product.productName}"></td>

            <td th:text="${product.category}"></td>

            <td th:text="${product.brand}"></td>

            <td th:text="${product.purchasePrice}"></td>

            <td th:text="${product.sellingPrice}"></td>

            <td th:text="${product.stockQuantity}"></td>

            <td>

                <a th:href="@{/editProduct/{id}(id=${product.productId})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/updateStock/{id}(id=${product.productId})}"
                   class="btn btn-primary btn-sm">
                    Stock
                </a>

                <a th:href="@{/deleteProduct/{id}(id=${product.productId})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this Product?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <div class="text-center">

        <a href="/" class="btn btn-secondary">
            Home
        </a>

        <a href="/purchase" class="btn btn-warning">
            Purchase
        </a>

        <a href="/sales" class="btn btn-danger">
            Sales
        </a>

    </div>

</div>

</body>

</html>
